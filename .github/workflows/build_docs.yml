name: test for building doc

on: [push]

jobs:
  check-build-doc:
    runs-on: ubuntu-22.04
    steps:
    - name: Inject slug/short variables
      uses: rlespinasse/github-slug-action@e6f261660910b273384c5c42b17a0217881b217a # v5.6.0

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: main

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3.11

    - name: Prepare LaTeX env
      run: |
        sudo apt update
        sudo apt install openmpi-bin libopenmpi-dev
        sudo apt install \
          texlive-latex-recommended texlive-latex-extra texlive-xetex \
          texlive-lang-japanese texlive-fonts-recommended texlive-fonts-extra latexmk
        kanji-config-updmap-sys ipaex

    - name: Install python packages
      run: |
        python -m pip install --upgrade pip
        pip install sphinx pydata-sphinx-theme
        cd ${GITHUB_WORKSPACE}/main
        python -m pip install '.[all]'

    - name: Build
      run: |
        cd ${GITHUB_WORKSPACE}/main/doc
        sh ./make.sh
