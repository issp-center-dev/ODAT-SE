[base]
dimension = 2
output_dir = "output"

[solver]
name = "custom"
#delay = 0.01

[runner]
[runner.log]
interval = 20

[algorithm]
name = "pamc"
seed = 12345

[algorithm.param]
mesh_path = "MeshData.txt"
neighborlist_path = "NeighborList.txt"

[algorithm.pamc]
numsteps_annealing = 100
Tnum = 11
bmin = 0.0
bmax = 10.0
Tlogspace = false
nreplica_per_proc = 10
fix_num_walkers = true
resampling_interval = 3
