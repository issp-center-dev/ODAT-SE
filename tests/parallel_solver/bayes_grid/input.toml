[base]
dimension = 2
output_dir = "output"

[solver]
name = "custom"
delay = 0.01

[runner]
[runner.log]
interval = 20

[algorithm]
name = "bayes"
seed = 1234567

[algorithm.param]
max_list = [ 6.0,  6.0]
min_list = [-6.0, -6.0]
num_list = [31, 31]

[algorithm.bayes]
random_max_num_probes = 5
bayes_max_num_probes = 20
