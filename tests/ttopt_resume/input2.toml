# Reference: single uninterrupted run to max_f_eval = 1000.
# Same seed and algorithm parameters as input1.toml.
# delay = 0.0 so the reference run finishes quickly; the delay value
# does not affect the optimal result, only wall-clock time.
[base]
dimension = 2
output_dir = "output2"

[algorithm]
name = "ttopt"
seed = 12345
checkpoint = false
checkpoint_steps = 1

[algorithm.param]
min_list = [-5.0, -5.0]
max_list = [5.0, 5.0]

[algorithm.ttopt]
p_points = [2, 2]
q_points = [20, 20]
r_max = 2
max_f_eval = 1000

[solver]
name = "analytical"
function_name = "quadratics"
delay = 0.0
