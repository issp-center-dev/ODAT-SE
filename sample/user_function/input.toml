[base]
dimension = 2
output_dir = "output"

[algorithm]
name = "mapper"
seed = 12345

[algorithm.param]
max_list = [6.0, 6.0]
min_list = [-6.0, -6.0]
num_list = [31, 31]

# The objective function is supplied from simple.py via solver.set_function(),
# so this uses the generic "function" solver (the name/function_name of the
# built-in analytical solver would be ignored here).
[solver]
name = "function"

[runner]
[runner.log]
interval = 20
